name: pnpm workspace

on:
  pull_request:
  push:
    branches:
      - main
      - chore/pnpm-migration

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aio
          POSTGRES_USER: aio
          POSTGRES_PASSWORD: aio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aio -d aio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI: "true"
      NODE_ENV: test
      APP_ORIGIN: http://127.0.0.1:3000
      API_ORIGIN: http://127.0.0.1:4000
      DRAFT_MESSAGE_ID_DOMAIN: mail.aio.test
      DATABASE_URL: postgres://aio:aio@127.0.0.1:5432/aio
      REDIS_URL: redis://127.0.0.1:6379
      GOOGLE_CLIENT_ID: ci-client-id
      GOOGLE_CLIENT_SECRET: ci-client-secret
      GOOGLE_REDIRECT_URI: http://127.0.0.1:4000/v1/auth/google/callback
      GOOGLE_PUBSUB_TOPIC: projects/aio-ci/topics/gmail
      GOOGLE_CLOUD_PROJECT: aio-ci
      PUBSUB_PUSH_AUDIENCE: http://127.0.0.1:4000/v1/webhooks/gmail
      PUBSUB_SERVICE_ACCOUNT_EMAIL: gmail-push@aio-ci.iam.gserviceaccount.com
      TOKEN_ENCRYPTION_KEY_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      SESSION_SECRET: ci-session-secret-0123456789-abcdefghijklmnopqrstuvwxyz
      PORT: "4000"
      WEB_PORT: "3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
      - name: Enable pinned pnpm
        run: corepack enable
      - name: Verify package manager
        run: pnpm --version
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Verify migrations
        run: pnpm db:migrate && pnpm db:verify
      - name: Typecheck
        run: pnpm check
      - name: Test
        run: pnpm test
      - name: Build runtime artifacts
        run: pnpm build:runtime
      - name: Build web
        run: pnpm --filter @aio/web run build
      - name: Verify repository state
        run: |
          test ! -f package-lock.json
          git diff --exit-code -- pnpm-lock.yaml

  docker:
    runs-on: ubuntu-latest
    needs: validate
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aio
          POSTGRES_USER: aio
          POSTGRES_PASSWORD: aio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aio -d aio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      APP_ORIGIN: http://127.0.0.1:3000
      API_ORIGIN: http://127.0.0.1:4000
      DRAFT_MESSAGE_ID_DOMAIN: mail.aio.test
      DATABASE_URL: postgres://aio:aio@127.0.0.1:5432/aio
      REDIS_URL: redis://127.0.0.1:6379
      GOOGLE_CLIENT_ID: ci-client-id
      GOOGLE_CLIENT_SECRET: ci-client-secret
      GOOGLE_REDIRECT_URI: http://127.0.0.1:4000/v1/auth/google/callback
      GOOGLE_PUBSUB_TOPIC: projects/aio-ci/topics/gmail
      GOOGLE_CLOUD_PROJECT: aio-ci
      PUBSUB_PUSH_AUDIENCE: http://127.0.0.1:4000/v1/webhooks/gmail
      PUBSUB_SERVICE_ACCOUNT_EMAIL: gmail-push@aio-ci.iam.gserviceaccount.com
      TOKEN_ENCRYPTION_KEY_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      SESSION_SECRET: ci-session-secret-0123456789-abcdefghijklmnopqrstuvwxyz
      PORT: "4000"
      WEB_PORT: "3000"
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build --tag aio-email-organizer:ci .
      - name: Verify packaged runtime syntax
        run: |
          docker run --rm --entrypoint node aio-email-organizer:ci --check api/runtime/server.js
          docker run --rm --entrypoint node aio-email-organizer:ci --check worker/runtime/worker.js
          docker run --rm --entrypoint node aio-email-organizer:ci --check worker/runtime/operations.js
          docker run --rm --entrypoint node aio-email-organizer:ci --check web/runtime/server.js
          docker run --rm --entrypoint node aio-email-organizer:ci --check database/runtime/migrate.js
      - name: Smoke test production image
        shell: bash
        run: |
          set -euo pipefail
          image=aio-email-organizer:ci
          env_args=(
            -e NODE_ENV -e APP_ORIGIN -e API_ORIGIN -e DRAFT_MESSAGE_ID_DOMAIN
            -e DATABASE_URL -e REDIS_URL -e GOOGLE_CLIENT_ID -e GOOGLE_CLIENT_SECRET
            -e GOOGLE_REDIRECT_URI -e GOOGLE_PUBSUB_TOPIC -e GOOGLE_CLOUD_PROJECT
            -e PUBSUB_PUSH_AUDIENCE -e PUBSUB_SERVICE_ACCOUNT_EMAIL
            -e TOKEN_ENCRYPTION_KEY_BASE64 -e SESSION_SECRET -e PORT -e WEB_PORT
          )
          docker run --rm --network host "${env_args[@]}" "$image" /app/database/runtime/migrate.js
          docker run --rm -d --name aio-api --network host "${env_args[@]}" "$image" /app/api/runtime/server.js
          docker run --rm -d --name aio-worker --network host "${env_args[@]}" "$image" /app/worker/runtime/worker.js
          docker run --rm -d --name aio-web --network host "${env_args[@]}" "$image" /app/web/runtime/server.js
          cleanup() {
            docker stop aio-api aio-worker aio-web >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4000/livez >/dev/null &&
               curl --fail --silent http://127.0.0.1:4000/readyz >/dev/null &&
               curl --fail --silent http://127.0.0.1:3000/ >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs aio-api
              docker logs aio-worker
              docker logs aio-web
              exit 1
            fi
            sleep 1
          done
          test "$(docker inspect -f '{{.State.Running}}' aio-worker)" = "true"
